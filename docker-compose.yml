# Set APP_URL and API_BASE_URL in .env before running. Run: ./up [--wipe]
services:
  foodbook:
    image: foodbook
    container_name: foodbook
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
      - /var/www/html/node_modules
      - letsencrypt_foodbook:/etc/letsencrypt
    env_file:
      - .env

volumes:
  letsencrypt_foodbook:
