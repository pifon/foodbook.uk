# Ports: leave unset for live (https://foodbook.uk) → 80, 443.
# Local with reverse-proxy: set FOODBOOK_BIND=127.0.0.1, FOODBOOK_HTTP_PORT=8081, FOODBOOK_HTTPS_PORT=8444 in .env (API uses 8080/8443)
# so the proxy can bind 80/443; access via https://foodbook (proxy forwards to container).
services:
  client:
    image: client
    container_name: client
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${FOODBOOK_BIND:-0.0.0.0}:${FOODBOOK_HTTP_PORT:-80}:80"
      - "${FOODBOOK_BIND:-0.0.0.0}:${FOODBOOK_HTTPS_PORT:-443}:443"
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
      - /var/www/html/node_modules
      - letsencrypt_foodbook:/etc/letsencrypt
    env_file:
      - .env
    # So that API_BASE_URL=https://pifon/api reaches the real API: resolve "pifon" to the API container on api_laravel-network.
    extra_hosts:
      - "pifon:172.18.0.3"
    networks:
      - client_laravel-network
      - api_network

networks:
  client_laravel-network:
    name: client_laravel-network
    driver: bridge
  api_network:
    name: api_laravel-network
    external: true

volumes:
  letsencrypt_foodbook:
