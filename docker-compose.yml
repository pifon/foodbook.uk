# Set APP_URL and API_BASE_URL in .env before running. Run: ./up [--wipe]
# When behind a reverse proxy (e.g. test.foodbook.uk → localhost), set FOODBOOK_HTTP_PORT=8080
# so the proxy can forward to 127.0.0.1:8080; then run ./up.
services:
  foodbook:
    image: foodbook
    container_name: foodbook
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${FOODBOOK_HTTP_PORT:-80}:80"
      - "${FOODBOOK_HTTPS_PORT:-443}:443"
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
      - /var/www/html/node_modules
      - letsencrypt_foodbook:/etc/letsencrypt
    env_file:
      - .env

volumes:
  letsencrypt_foodbook:
