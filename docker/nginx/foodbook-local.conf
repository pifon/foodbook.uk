# Nginx config for https://foodbook (local). Use this so https://foodbook/
# proxies to the Foodbook client (port 8080).
#
# 1. Run docker/ssl-foodbook-local.sh once to create certs in /etc/letsencrypt/live/foodbook
# 2. Add this server block to the nginx that serves https://foodbook.
# 3. Set proxy_pass to the host:port that reaches Foodbook (e.g. 127.0.0.1:8080 when nginx is on the same host).
#    When nginx runs in Docker, use the host IP or an upstream that reaches the app.
# 4. Reload nginx (e.g. docker exec <container> nginx -s reload, or sudo systemctl reload nginx)
#
server {
    listen 443 ssl;
    server_name foodbook;

    ssl_certificate /etc/letsencrypt/live/foodbook/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/foodbook/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }
}
